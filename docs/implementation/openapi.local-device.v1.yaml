openapi: 3.1.0
info:
  title: Booth Local Device API
  version: 1.0.0
  description: >
    下一代 AI Photo Booth 本地设备控制 API 草案。
    该 API 面向 Booth Runtime 本机自动化与受控外部集成。
servers:
  - url: http://localhost:{port}
    variables:
      port:
        default: "17890"
security:
  - boothToken: []
tags:
  - name: Health
  - name: Devices
  - name: Sessions
  - name: Jobs
components:
  securitySchemes:
    boothToken:
      type: http
      scheme: bearer
      bearerFormat: BoothScopedToken
  schemas:
    ErrorResponse:
      type: object
      required: [errorCode, message]
      properties:
        errorCode:
          type: string
          example: CAM_DEVICE_NOT_READY
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    DeviceSummary:
      type: object
      required: [deviceId, deviceType, status]
      properties:
        deviceId:
          type: string
        deviceType:
          type: string
          example: camera
        vendor:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        status:
          type: string
          enum: [disconnected, connecting, ready, previewing, busy, error]
        capabilities:
          type: array
          items:
            type: string
    SessionStartRequest:
      type: object
      required: [sessionId, eventId, mode, deviceId]
      properties:
        sessionId:
          type: string
        eventId:
          type: string
        mode:
          type: string
          enum: [Print, Gif, Boomerang, Video, Digital]
        deviceId:
          type: string
    SessionStartResponse:
      type: object
      required: [sessionId, status, nextAction]
      properties:
        sessionId:
          type: string
        status:
          type: string
          enum: [ready, countdown, capturing, cancelled, completed, failed]
        nextAction:
          type: string
    CaptureShotRequest:
      type: object
      properties:
        preferredShotId:
          type: string
          nullable: true
        sourceLabel:
          type: string
          nullable: true
        aiPickScore:
          type: number
          format: double
          nullable: true
    CaptureShotResponse:
      type: object
      required: [sessionId, shotId, shotIndex, rawAssetPath, capturedAtUtc]
      properties:
        sessionId:
          type: string
        shotId:
          type: string
        shotIndex:
          type: integer
        rawAssetPath:
          type: string
        capturedAtUtc:
          type: string
          format: date-time
    ShotDetails:
      type: object
      required: [shotId, sessionId, shotIndex, rawAssetPath, capturedAtUtc]
      properties:
        shotId:
          type: string
        sessionId:
          type: string
        shotIndex:
          type: integer
        rawAssetPath:
          type: string
        capturedAtUtc:
          type: string
          format: date-time
        aiPickScore:
          type: number
          format: double
          nullable: true
    ShareChannel:
      type: object
      required: [type, recipient]
      properties:
        type:
          type: string
          enum: [email, sms, qr, whatsapp, airdrop]
        recipient:
          type: string
    ShareJobsRequest:
      type: object
      required: [sessionId, channels]
      properties:
        sessionId:
          type: string
        channels:
          type: array
          items:
            $ref: '#/components/schemas/ShareChannel'
        consentToken:
          type: string
          nullable: true
    ShareJobsResponse:
      type: object
      required: [jobIds, status]
      properties:
        jobIds:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [queued]
    PrintJobRequest:
      type: object
      required: [sessionId, copies]
      properties:
        sessionId:
          type: string
        copies:
          type: integer
          minimum: 1
        printerProfileId:
          type: string
          nullable: true
    PrintJobResponse:
      type: object
      required: [jobId, jobType, status]
      properties:
        jobId:
          type: string
        jobType:
          type: string
        status:
          type: string
          enum: [queued]
    JobDetails:
      type: object
      required: [jobId, jobType, aggregateId, status, priority, attemptCount, scheduledAtUtc]
      properties:
        jobId:
          type: string
        jobType:
          type: string
        aggregateId:
          type: string
        status:
          type: string
        priority:
          type: integer
        attemptCount:
          type: integer
        scheduledAtUtc:
          type: string
          format: date-time
        payloadJson:
          type: string
          nullable: true
        createdAssetId:
          type: string
          nullable: true
        lastErrorCode:
          type: string
          nullable: true
        lastErrorMessage:
          type: string
          nullable: true
    OutputAsset:
      type: object
      required: [assetId, sessionId, assetType, storageScope, createdAtUtc]
      properties:
        assetId:
          type: string
        sessionId:
          type: string
        assetType:
          type: string
        storageScope:
          type: string
        localPath:
          type: string
          nullable: true
        remoteUrl:
          type: string
          nullable: true
        createdAtUtc:
          type: string
          format: date-time
    JobExecutionResponse:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
        status:
          type: string
        createdAssetId:
          type: string
          nullable: true
    SessionDetailsResponse:
      type: object
      required: [sessionId, eventId, mode, status, deviceId, startedAtUtc, retryCount, shots, jobs, assets]
      properties:
        sessionId:
          type: string
        eventId:
          type: string
        mode:
          type: string
        status:
          type: string
        deviceId:
          type: string
        startedAtUtc:
          type: string
          format: date-time
        completedAtUtc:
          type: string
          nullable: true
          format: date-time
        retryCount:
          type: integer
        shots:
          type: array
          items:
            $ref: '#/components/schemas/ShotDetails'
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/JobDetails'
        assets:
          type: array
          items:
            $ref: '#/components/schemas/OutputAsset'
paths:
  /v1/health:
    get:
      tags: [Health]
      summary: Get runtime health summary
      responses:
        "200":
          description: Health summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  runtimeVersion:
                    type: string
                  checks:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /v1/devices:
    get:
      tags: [Devices]
      summary: List connected devices
      responses:
        "200":
          description: Connected devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceSummary'
  /v1/session/start:
    post:
      tags: [Sessions]
      summary: Start booth session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionStartRequest'
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStartResponse'
        "409":
          description: Session cannot start
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/session/{sessionId}/cancel:
    post:
      tags: [Sessions]
      summary: Cancel active session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session cancelled
  /v1/sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Get session aggregate details
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session aggregate details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailsResponse'
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/sessions/{sessionId}/shots:
    post:
      tags: [Shots]
      summary: Capture one shot into session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureShotRequest'
      responses:
        "200":
          description: Shot captured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureShotResponse'
        "404":
          description: Session not found
    get:
      tags: [Shots]
      summary: List shots for session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session shots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShotDetails'
        "404":
          description: Session not found
  /v1/print/jobs:
    post:
      tags: [Jobs]
      summary: Queue print job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrintJobRequest'
      responses:
        "202":
          description: Print job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintJobResponse'
  /v1/share/jobs:
    post:
      tags: [Jobs]
      summary: Queue share jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareJobsRequest'
      responses:
        "202":
          description: Share jobs queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareJobsResponse'
  /v1/jobs/{jobId}:
    get:
      tags: [Jobs]
      summary: Get queued job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetails'
        "404":
          description: Job not found
  /v1/jobs/{jobId}/execute:
    post:
      tags: [Jobs]
      summary: Execute queued job in local runtime
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionResponse'
        "404":
          description: Job not found
  /v1/sessions/{sessionId}/assets:
    get:
      tags: [Assets]
      summary: List generated assets for session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OutputAsset'
        "404":
          description: Session not found
  /v1/assets/{assetId}:
    get:
      tags: [Assets]
      summary: Get asset details
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutputAsset'
        "404":
          description: Asset not found
    delete:
      tags: [Assets]
      summary: Soft delete asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset deleted
        "404":
          description: Asset not found
