name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  DOTNET_VERSION: '8.0'

jobs:
  # Repository hygiene
  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check tracked generated artifacts
        run: python tools/check_repository_hygiene.py

  # Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: repository-hygiene

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dbooth_test
          POSTGRES_USER: dbooth_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: D-Booth/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run linters
        working-directory: D-Booth/backend
        run: |
          black --check .
          isort --check-only .
          ruff check app/
          mypy app/

      - name: Run tests
        working-directory: D-Booth/backend
        env:
          DATABASE_URL: postgresql+asyncpg://dbooth_user:test_password@localhost:5432/dbooth_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'False'
        run: |
          pytest --cov=app --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./D-Booth/backend/coverage.xml
          flags: backend

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: repository-hygiene

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: D-Booth/frontend/package-lock.json

      - name: Install dependencies
        working-directory: D-Booth/frontend
        run: npm ci

      - name: Type check
        working-directory: D-Booth/frontend
        run: npm run typecheck

      - name: Build
        working-directory: D-Booth/frontend
        run: npm run build

  # Runtime Tests
  runtime-test:
    name: Runtime Tests
    runs-on: windows-latest
    needs: repository-hygiene

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        working-directory: D-Booth/runtime-dotnet
        run: dotnet restore

      - name: Build
        working-directory: D-Booth/runtime-dotnet
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        working-directory: D-Booth/runtime-dotnet
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./D-Booth/runtime-dotnet/**/coverage.cobertura.xml
          flags: runtime

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Python dependency check
        working-directory: D-Booth/backend
        run: |
          pip install -r requirements-dev.txt
          python -m pip_audit -r requirements.txt -r requirements-dev.txt --strict
        continue-on-error: true

      - name: Node.js dependency audit
        working-directory: D-Booth/frontend
        run: npm run audit:security
        continue-on-error: true

  # Docker Build
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./D-Booth/backend
          push: true
          tags: |
            dbooth/backend:latest
            dbooth/backend:${{ github.sha }}
          cache-from: type=registry,ref=dbooth/backend:latest
          cache-to: type=inline

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./D-Booth/frontend
          push: true
          tags: |
            dbooth/frontend:latest
            dbooth/frontend:${{ github.sha }}
          cache-from: type=registry,ref=dbooth/frontend:latest
          cache-to: type=inline

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: [backend-test, frontend-test, runtime-test]
    environment:
      name: staging
      url: https://staging.dbooth.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your deployment script here

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-build]
    environment:
      name: production
      url: https://app.dbooth.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your deployment script here

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
